# Bare-metal Linode deploy artifact (no Docker). Upload on version tags; artifact on manual run.
name: publish-linode-tarball

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release + pack
        run: ./scripts/pack-linode-deploy.sh

      - name: Upload workflow artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: relay-linode-deploy
          path: target/relay-linode-deploy.tgz

      - name: Attach to GitHub Release (tags v*)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: target/relay-linode-deploy.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
