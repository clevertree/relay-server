# Bare-metal deploy: relay-linode-deploy.tgz (relay-server + relay-hook-handler + install scripts).
name: publish-linode-tarball

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: linode-tarball-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release + pack
        run: ./scripts/pack-linode-deploy.sh

      - name: Upload artifact (main branch & manual)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: relay-linode-deploy-${{ github.sha }}
          path: target/relay-linode-deploy.tgz
          retention-days: 90

      - name: Attach to GitHub Release (tags v*)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: target/relay-linode-deploy.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
